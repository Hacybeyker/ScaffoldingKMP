# CI — Calidad, Android e iOS
# Genérico: usa las tareas agregadas del build raíz (checkCodeQuality, etc.)
# y no depende del nombre del proyecto ni del package.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Estrategia de jobs:
#   quality ──┬──> android   (paralelos entre sí)
#             └──> ios
# `quality` actúa como gate: es el job más rápido y barato (Linux). Si falla,
# no se gasta cómputo en builds — sobre todo en iOS, que corre en macOS (10x
# el costo de minutos de Linux). `android` e `ios` sí corren en paralelo
# porque validan plataformas distintas: ante un fallo en código común conviene
# ver el resultado de ambas en una sola ronda de CI.
jobs:
  quality:
    name: Code Quality (ktlint + detekt + Lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (con cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Run quality checks
        run: ./gradlew checkCodeQuality

      - name: Upload quality reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: quality-reports
          path: |
            **/build/reports/ktlint/
            **/build/reports/detekt/
            **/build/reports/lint-results-*.html
          if-no-files-found: ignore

  android:
    name: Android — Build & Test
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (con cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Unit tests (shared)
        run: ./gradlew :shared:testAndroidHostTest

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore

  ios:
    name: iOS — Build & Test
    runs-on: macos-latest
    needs: quality
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (con cache)
        uses: gradle/actions/setup-gradle@v6

      # El compilador de Kotlin/Native se descarga en ~/.konan; cachearlo
      # ahorra varios minutos por ejecución.
      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Unit tests (shared, iOS Simulator)
        run: ./gradlew :shared:iosSimulatorArm64Test

      - name: Build iOS app (sin firma)
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
