# Release — se dispara al pushear un tag v* (ej. v1.0.0)
# Genera el APK y el AAB de release (SIN firmar) y crea un GitHub Release
# con los artefactos adjuntos y notas generadas automáticamente.
#
# ── Para publicar builds FIRMADOS ────────────────────────────────────────────
# 1. Agrega los secrets del repo: KEYSTORE_BASE64, KEYSTORE_PASSWORD,
#    KEY_ALIAS y KEY_PASSWORD.
# 2. Decodifica el keystore antes del build:
#      - run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
# 3. Configura signingConfigs en androidApp/build.gradle.kts leyendo esas
#    variables de entorno.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  android-release:
    name: Android — Release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (con cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Quality gate
        run: ./gradlew checkCodeQuality

      - name: Unit tests
        run: ./gradlew :shared:testAndroidHostTest

      - name: Build release APK + AAB (sin firmar)
        run: ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            androidApp/build/outputs/apk/release/*.apk \
            androidApp/build/outputs/bundle/release/*.aab
